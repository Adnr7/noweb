<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page for Sale</title>
    <style>
        body {
            background: linear-gradient(135deg, #f8fafc 0%, #e0e7ef 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        .container {
            background: #fff;
            padding: 2.5rem 3rem;
            border-radius: 1.5rem;
            box-shadow: 0 8px 32px rgba(60, 72, 88, 0.15);
            text-align: center;
            max-width: 400px;
        }
        h1 {
            color: #2d3748;
            font-size: 2.2rem;
            margin-bottom: 1rem;
            letter-spacing: 1px;
        }
        h2 {
            color: #4a5568;
            font-size: 1.1rem;
            font-weight: 400;
            margin-top: 0.5rem;
        }
        .contact {
            margin-top: 1.5rem;
            font-size: 1rem;
        }
        .email-link {
            color: #3182ce;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }
        .email-link:hover {
            color: #2b6cb0;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>This Page is For Sale</h1>
        <h2>Interested in owning this domain?</h2>
        <div class="contact">
            Contact us at <a class="email-link" href="mailto:support@noweb.site">support@noweb.site</a>
        </div>
    </div>
</body>
</html>
