<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>noweb.site — Under Progress</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    height: 100vh;
    background: #1a1a1a;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: Arial, sans-serif;
    overflow: hidden;
  }

  .card {
    background: #242424;
    border: 0.5px solid rgba(255, 255, 255, 0.1);
    border-radius: 18px;
    padding: 3rem 2rem;
    max-width: 480px;
    width: 90%;
    text-align: center;
  }

  .badge {
    display: inline-block;
    background: rgba(180, 180, 180, 0.12);
    color: #b4b4b4;
    font-size: 11px;
    font-weight: 500;
    padding: 4px 12px;
    border-radius: 20px;
    border: 0.5px solid rgba(180, 180, 180, 0.25);
    margin-bottom: 1rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .domain {
    font-size: clamp(1.6rem, 5vw, 2.6rem);
    font-weight: 700;
    color: #f1f1f1;
    letter-spacing: -0.02em;
    margin-bottom: 1rem;
  }

  .tld { color: #909090; }

  .tagline {
    font-size: 15px;
    color: #888;
    line-height: 1.5;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="badge">Work In Progress</div>
    <div class="domain">noweb<span class="tld">.site</span></div>
    <p class="tagline">Under progress on website</p>
  </div>
</body>
</html>
