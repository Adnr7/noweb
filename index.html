<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>noweb.site — Domain For Sale</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    height: 100vh;
    background: #1a1a1a;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: Arial, sans-serif;
    overflow: hidden;
  }

  .card {
    background: #242424;
    border: 0.5px solid rgba(255, 255, 255, 0.1);
    border-radius: 18px;
    padding: 2rem 2rem 1.5rem;
    max-width: 480px;
    width: 90%;
    text-align: center;
  }

  .badge {
    display: inline-block;
    background: rgba(180, 180, 180, 0.12);
    color: #b4b4b4;
    font-size: 11px;
    font-weight: 500;
    padding: 4px 12px;
    border-radius: 20px;
    border: 0.5px solid rgba(180, 180, 180, 0.25);
    margin-bottom: 1rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .domain {
    font-size: clamp(1.6rem, 5vw, 2.6rem);
    font-weight: 700;
    color: #f1f1f1;
    letter-spacing: -0.02em;
    margin-bottom: 0.35rem;
  }

  .tld { color: #909090; }

  .tagline {
    font-size: 13px;
    color: #888;
    line-height: 1.5;
    margin-bottom: 1.25rem;
  }

  .divider {
    height: 0.5px;
    background: rgba(255, 255, 255, 0.08);
    margin: 1.25rem 0;
  }

  .features {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 1.25rem;
  }

  .feat {
    background: rgba(255, 255, 255, 0.04);
    border: 0.5px solid rgba(255, 255, 255, 0.07);
    border-radius: 10px;
    padding: 10px 12px;
    text-align: left;
  }

  .feat-icon { font-size: 15px; margin-bottom: 4px; }

  .feat-label {
    font-size: 10px;
    color: #555;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-weight: 500;
    margin-bottom: 2px;
  }

  .feat-val {
    font-size: 13px;
    color: #bbb;
    font-weight: 500;
  }

  .cta-group { display: flex; flex-direction: column; gap: 8px; }

  .cta-primary {
    background: #555;
    color: #f1f1f1;
    border: none;
    border-radius: 10px;
    padding: 12px 24px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    width: 100%;
    transition: background 0.2s;
  }
  .cta-primary:hover { background: #666; }

  .cta-secondary {
    background: transparent;
    color: #888;
    border: 0.5px solid rgba(255, 255, 255, 0.12);
    border-radius: 10px;
    padding: 11px 24px;
    font-size: 13px;
    cursor: pointer;
    width: 100%;
    transition: background 0.2s;
  }
  .cta-secondary:hover { background: rgba(255, 255, 255, 0.05); color: #bbb; }

  .contact-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    margin-top: 1rem;
    font-size: 12px;
    color: #555;
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #22c55e;
    display: inline-block;
    flex-shrink: 0;
  }

  .email { color: #999; text-decoration: none; }
  .email:hover { color: #bbb; }

  .price-note {
    font-size: 11px;
    color: #484848;
    margin-top: 0.5rem;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="badge">Premium Domain</div>
    <div class="domain">noweb<span class="tld">.site</span></div>
    <p class="tagline">A short, memorable domain ready for your next big idea —<br>brand, startup, or product launch.</p>

    <div class="features">
      <div class="feat">
        <div class="feat-icon">⚡</div>
        <div class="feat-label">Extension</div>
        <div class="feat-val">.site TLD</div>
      </div>
      <div class="feat">
        <div class="feat-icon">✦</div>
        <div class="feat-label">Length</div>
        <div class="feat-val">5 characters</div>
      </div>
      <div class="feat">
        <div class="feat-icon">◈</div>
        <div class="feat-label">Type</div>
        <div class="feat-val">Dictionary word</div>
      </div>
      <div class="feat">
        <div class="feat-icon">◉</div>
        <div class="feat-label">Status</div>
        <div class="feat-val" style="color: #4ade80;">Available now</div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="cta-group">
      <button class="cta-primary" onclick="window.location.href='mailto:support@noweb.site?subject=Inquiry: noweb.site Domain Purchase'">Make an offer</button>
      <button class="cta-secondary" onclick="window.location.href='mailto:support@noweb.site?subject=Question: noweb.site Domain'">Ask a question</button>
    </div>

    <div class="contact-row">
      <span class="dot"></span>
      <span>Contact:</span>
      <a href="mailto:support@noweb.site" class="email">support@noweb.site</a>
    </div>
    <p class="price-note">Secure transfer · Fast response · Negotiable pricing</p>
  </div>
</body>
</html>
